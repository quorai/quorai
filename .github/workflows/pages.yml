name: Deploy site to quorai.github.io

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build site
        run: uv run python scripts/build_site.py

      - name: Add .nojekyll
        run: touch docs/.nojekyll

      - name: Deploy to quorai.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          external_repository: quorai/quorai.github.io
          publish_branch: main
          publish_dir: ./docs
          force_orphan: true
          user_name: quorai-bot
          user_email: actions@github.com
          commit_message: "deploy: ${{ github.sha }}"
